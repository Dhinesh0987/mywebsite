<!DOCTYPE html>
<html>

<head>
<title>DD Arts</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:40px;
}

.card{
background:#222;
width:250px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,255,255,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h2{
text-align:center;
}

.price{
text-align:center;
font-size:22px;
color:yellow;
}

button{
display:block;
margin:20px auto;
padding:12px 25px;
border:none;
border-radius:10px;
background:orange;
font-size:18px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:30px;
}

</style>
</head>

<body>

<header>
Dhinesh Photo Frames
</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32">
<h2>Wedding Frame</h2>
<p class="price">₹499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<h2>Couple Frame</h2>
<p class="price">₹699</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4">
<h2>Family Frame</h2>
<p class="price">₹899</p>
<button>Buy Now</button>
</div>

</div>

<footer>
© 2026 Dhinesh Frames
</footer>

</body>
</html>
